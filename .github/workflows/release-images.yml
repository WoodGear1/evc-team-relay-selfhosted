name: Release Images

on:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: woodgear1/evc-team-relay-selfhosted

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: release-images-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --legacy-peer-deps

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for control-plane
        id: meta-cp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/control-plane
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push control-plane
        uses: docker/build-push-action@v6
        with:
          context: apps/control-plane
          push: true
          tags: ${{ steps.meta-cp.outputs.tags }}
          labels: ${{ steps.meta-cp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for web-publish
        id: meta-wp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/web-publish
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web-publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-publish/Dockerfile
          push: true
          tags: ${{ steps.meta-wp.outputs.tags }}
          labels: ${{ steps.meta-wp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for relay-server
        id: meta-rs
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/relay-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push relay-server
        uses: docker/build-push-action@v6
        with:
          context: apps/relay-server
          push: true
          tags: ${{ steps.meta-rs.outputs.tags }}
          labels: ${{ steps.meta-rs.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
