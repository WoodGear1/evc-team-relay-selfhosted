      - /mnt/tank/docker-containers/obsidian-relay/patches/migrations/202604050001_add_git_sync_notify_trigger.py:/app/app/db/migrations/versions/202604050001_add_git_sync_notify_trigger.py:ro

  control-plane-migrate:
    volumes:
      - /mnt/tank/docker-containers/obsidian-relay/patches/core/config.py:/app/app/core/config.py:ro
      - /mnt/tank/docker-containers/obsidian-relay/patches/models.py:/app/app/db/models.py:ro
      - /mnt/tank/docker-containers/obsidian-relay/patches/schemas/published_link.py:/app/app/schemas/published_link.py:ro
      - /mnt/tank/docker-containers/obsidian-relay/patches/schemas/document_version.py:/app/app/schemas/document_version.py:ro
      - /mnt/tank/docker-containers/obsidian-relay/patches/migrations/202604020001_add_published_links_comments.py:/app/app/db/migrations/versions/202604020001_add_published_links_comments.py:ro
      - /mnt/tank/docker-containers/obsidian-relay/patches/migrations/202604020002_backfill_published_links.py:/app/app/db/migrations/versions/202604020002_backfill_published_links.py:ro
      - /mnt/tank/docker-containers/obsidian-relay/patches/migrations/202604040001_add_document_versions.py:/app/app/db/migrations/versions/202604040001_add_document_versions.py:ro
      - /mnt/tank/docker-containers/obsidian-relay/patches/migrations/202604040002_expand_auditaction_for_web_publish.py:/app/app/db/migrations/versions/202604040002_expand_auditaction_for_web_publish.py:ro
      - /mnt/tank/docker-containers/obsidian-relay/patches/migrations/202604050001_add_git_sync_notify_trigger.py:/app/app/db/migrations/versions/202604050001_add_git_sync_notify_trigger.py:ro

  web-publish:
    image: !reset null
    build:
      context: ..
      dockerfile: ./apps/web-publish/Dockerfile
    ports:
      - "3300:3000"

  git-sync:
    build:
      context: ../apps/git-sync
      dockerfile: Dockerfile
    ports:
      - "3400:8000"
    volumes:
      - /mnt/tank/docker-containers/obsidian-relay/git-sync:/repo
      - /mnt/tank/docker-containers/obsidian-relay/keys:/keys:ro

  yjs-bridge:
    build:
      context: ../apps/yjs-bridge
      dockerfile: Dockerfile
    ports:
      - "3500:3500"
