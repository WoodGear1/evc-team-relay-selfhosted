upstream obsidian_webpublish {
    server 172.16.0.1:3300;
    keepalive 16;
}

server {
    listen 8880;
    server_name docs.wgwg.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 4443 ssl;
    http2 on;
    server_name docs.wgwg.ru;

    ssl_certificate     /etc/letsencrypt/live/docs.wgwg.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.wgwg.ru/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    location / {
        proxy_pass http://obsidian_webpublish;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_buffering off;
    }
}
